<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f5c400">

  <title>Logowanie | Taxi Andrzej Pełka</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <main style="max-width: 520px; margin: 60px auto; padding: 16px;">

    <section class="card">

      <span class="eyebrow">Panel pracownika</span>

      <h1>Logowanie</h1>

      <p class="muted">
        Zaloguj się jako administrator firmy lub kierowca.
      </p>

      <form id="loginForm" class="stack">

        <label>
          <span>Adres e-mail</span>
          <input
            id="loginEmail"
            type="email"
            autocomplete="email"
            required
          >
        </label>

        <label>
          <span>Hasło</span>
          <input
            id="loginPassword"
            type="password"
            autocomplete="current-password"
            required
          >
        </label>

        <button
          id="loginButton"
          class="btn btn-primary btn-large"
          type="submit"
        >
          Zaloguj się
        </button>

      </form>

      <div
        id="loginMessage"
        style="margin-top: 18px;"
        aria-live="polite"
      ></div>

      <a
        class="btn btn-secondary"
        href="./"
        style="margin-top: 18px;"
      >
        Wróć do strony klienta
      </a>

    </section>

  </main>

  <script type="module" src="login.js"></script>

</body>
</html>
